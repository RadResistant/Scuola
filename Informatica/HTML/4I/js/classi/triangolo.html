<!DOCTYPE html>

<body>
    <script>
        class triangolo{
            constructor(b,a,c){
                this.base=b;
                this.lato1=a;
                this.lato2=c;
            }
            aTesto(){
                return "Triangolo "+this.base+" "+this.lato1+" "+this.lato2;
            }
            perimetro(){
                return this.lato1+this.lato2+this.base;
            }

        }
    </script>
</body>
